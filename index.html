<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>FCCS Flasher Tool</title>
  <style>
    body{font-family:sans-serif;max-width:600px;margin:2rem auto}
    #log{white-space:pre-wrap;background:#f0f0f0;padding:.5rem}
  </style>
</head>
<body>
  <h1>FCCS Flash Tool</h1>

  <p>
    <button id="connect">Connect to FCCS</button>
    <button id="sendMagic" disabled>Send BLDR magic</button>
    <button id="flash" disabled>Flash firmware to FCCS</button>
    <input type="file" id="firmware" accept=".bin">
  </p>

  <p>After reset, click <b>Send BLDR magic</b> (or click Flash, which sends it automatically).</p>

  <pre id="log"></pre>

  <script src="flasher.js"></script>
</body>
</html>
